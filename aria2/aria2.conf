# ======== RPC ========
enable-rpc=true
rpc-listen-all=true
rpc-allow-origin-all=true
# rpc-secret=token

# ======== 基本 ========
dir=${HOME}/Downloads
continue=true
max-concurrent-downloads=5
max-connection-per-server=16
min-split-size=10M
split=16
disable-ipv6=false

# ======== 进度与日志 ========
console-log-level=warn
log-level=notice
log=${HOME}/.config/aria2/aria2.log

# ======== 会话保存（重启后继续做种/恢复任务） ========
save-session=${HOME}/.config/aria2/aria2.session
input-file=${HOME}/.config/aria2/aria2.session
save-session-interval=30
force-save=true

# ======== DHT（磁力链接的关键） ========
enable-dht=true
enable-dht6=true
dht-listen-port=6881-6999
dht-file-path=${HOME}/.config/aria2/dht.dat
dht6-file-path=${HOME}/.config/aria2/dht6.dat
dht-message-timeout=15
dht-entry-point=router.bittorrent.com:6881
dht-entry-point6=router.bittorrent.com:6881
dht-entry-point=dht.transmissionbt.com:6881
dht-entry-point=dht.libtorrent.org:25401

# ======== 元数据加速 ========
bt-save-metadata=true
bt-tracker-connect-timeout=10

# ======== 本地 Peer 发现 ========
bt-enable-lpd=true
enable-peer-exchange=true

# ======== BT 参数 ========
bt-max-peers=256
bt-request-peer-speed-limit=10M
bt-max-open-files=1000
seed-time=0
max-upload-limit=500K
seed-ratio=0.0

# ======== 加密（绕过 ISP 限速） ========
bt-force-encryption=true
bt-require-crypto=false
bt-min-crypto-level=arc4

# ======== 全局速率（0=不限） ========
max-overall-download-limit=0
max-overall-upload-limit=500K

# ======== Tracker（每天更新一次效果更好） ========
bt-tracker=udp://zer0day.ch:1337/announce,udp://tracker.publictracker.xyz:6969/announce,http://tracker.opentrackr.org:1337/announce,udp://open.demonii.com:1337/announce,udp://open.stealth.si:80/announce,udp://tracker.torrent.eu.org:451/announce,udp://exodus.desync.com:6969/announce,udp://yuptracker-eu.gaijinent.com:27022/announce,udp://tracker2.dler.org:80/announce,udp://tracker.wildkat.net:6969/announce,udp://tracker.qu.ax:6969/announce,udp://tracker.opentorrent.top:6969/announce,udp://tracker.filemail.com:6969/announce,udp://tracker.ducks.party:1984/announce,udp://tracker.corpscorp.online:80/announce,udp://tracker.bluefrog.pw:2710/announce,udp://tracker.bittor.pw:1337/announce,udp://tracker.auctor.tv:6969/announce,udp://tracker.004430.xyz:1337/announce,udp://tracker-udp.gbitt.info:80/announce

# ======== 快速失败（减少等待） ========
async-dns=false
connect-timeout=10
max-tries=5
retry-wait=5
timeout=60

# ======== 文件分配 ========
file-allocation=none
